services:
  - type: web
    name: dm-ai-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: LLM_PROVIDER
        value: gemini
      - key: INGEST_API_ENABLED
        value: "false"
      - key: KNOWLEDGE_DIR
        value: data/knowledge
      - key: VECTOR_STORE_DIR
        value: data/vector_store
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: CORS_ORIGINS
        sync: false
